[env:rpipico2]
; Use the community-maintained fork for RP2350 support
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico2
framework = arduino

; Recommended: Use the Earlephilhower core for better Pico 2 support
board_build.core = earlephilhower

; Common settings
monitor_speed = 115200